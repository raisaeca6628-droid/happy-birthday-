<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Utyy Sayang! 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

        :root {
            --pink: #FFB6C1;
            --blue: #A2D2FF;
            --white: #FFFFFF;
            --hot-pink: #FF69B4;
        }

        body {
            margin: 0;
            padding: 0;
            /* Background gradasi jauh lebih halus & nyata */
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
        }

        /* Teks Berjalan Atas (Marquee) - Lebih Smooth */
        .marquee-container {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            padding: 15px 0;
            border-bottom: 2px solid var(--white);
            z-index: 100;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            font-size: 1.4em;
            color: var(--hot-pink);
            font-weight: bold;
            animation: marquee 18s linear infinite;
        }

        @keyframes marquee {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* Dashboard Utama - Efek Glassmorphism Nyata */
        .dashboard {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 10;
            max-width: 80%;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .main-title {
            font-size: 3.2em;
            margin: 0;
            background: linear-gradient(45deg, #FF69B4, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            letter-spacing: 2px;
        }

        .hug-emot {
            font-size: 3em;
            color: var(--hot-pink);
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--pink));
        }

        /* Animasi Item Terbang (Smooth & Gak Ngeleg) */
        .item {
            position: absolute;
            bottom: -100px;
            pointer-events: none;
            z-index: 1;
            animation: rise linear forwards;
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .sub-text {
            color: #55acee;
            font-size: 1.2em;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text">
            bahagia selalu utyy • selamat ulang tahun utyy sayang • panjang umur & sehat selalu yaa • makin cantik & sukses terus! 💖✨🎂
        </div>
    </div>

    <div class="dashboard">
        <span class="hug-emot">(づ｡◕‿‿◕｡)づ</span>
        <h1 class="main-title">HAPPY BIRTHDAY<br>UTYY!</h1>
        <p class="sub-text">Wish you all the best, Sayang! 🥳</p>
    </div>

    <script>
        // Fungsi spawn item (Kue & Hati) - Kecepatan diatur biar rapi
        function spawnItem() {
            const items = ['🎂', '🍰', '🧁', '💖', '🎈', '✨'];
            const itemElement = document.createElement('div');
            itemElement.className = 'item';
            
            // Randomize emot
            itemElement.innerText = items[Math.floor(Math.random() * items.length)];
            
            // Randomize posisi horizontal
            itemElement.style.left = Math.random() * 100 + 'vw';
            
            // Randomize ukuran (biar estetik)
            const size = Math.random() * 20 + 20;
            itemElement.style.fontSize = size + 'px';
            
            // Durasi naik dipelanin biar rapi (6-9 detik)
            const duration = Math.random() * 3 + 6;
            itemElement.style.animationDuration = duration + 's';
            
            document.body.appendChild(itemElement);

            // Hapus element setelah selesai biar gak berat (ngeleg)
            setTimeout(() => {
                itemElement.remove();
            }, duration * 1000);
        }

        // Munculin item setiap 800ms (tidak terlalu cepat biar rapi)
        setInterval(spawnItem, 800);
    </script>
</body>
</html>
